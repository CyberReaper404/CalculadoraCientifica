name: release-windows-app

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest
    env:
      MM_CALC_REPOSITORY_SLUG: ${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Inno Setup
        run: choco install innosetup -y

      - name: Restore WPF app
        run: dotnet restore .\CalculadoraCientifica.Wpf\CalculadoraCientifica.Wpf.csproj --locked-mode

      - name: Restore tests
        run: dotnet restore .\CalculadoraCientifica.Core.Tests\CalculadoraCientifica.Core.Tests.csproj --locked-mode

      - name: Restore UI tests
        run: dotnet restore .\CalculadoraCientifica.Wpf.UITests\CalculadoraCientifica.Wpf.UITests.csproj --locked-mode

      - name: Build WPF app
        run: dotnet build .\CalculadoraCientifica.Wpf\CalculadoraCientifica.Wpf.csproj -c Release --no-restore

      - name: Build UI tests
        run: dotnet build .\CalculadoraCientifica.Wpf.UITests\CalculadoraCientifica.Wpf.UITests.csproj -c Release --no-restore

      - name: Test core
        run: dotnet test .\CalculadoraCientifica.Core.Tests\CalculadoraCientifica.Core.Tests.csproj -c Release --no-restore

      - name: Test UI
        env:
          MM_CALC_EXE_PATH: ${{ github.workspace }}\CalculadoraCientifica.Wpf\bin\Release\net8.0-windows\MMCalcCientifica.exe
        run: dotnet test .\CalculadoraCientifica.Wpf.UITests\CalculadoraCientifica.Wpf.UITests.csproj -c Release --no-build

      - name: Build portable package
        shell: pwsh
        run: .\publish-wpf.ps1

      - name: Build installer
        shell: pwsh
        run: .\scripts\build-installer.ps1

      - name: Generate release hashes
        shell: pwsh
        run: .\scripts\generate-release-hash.ps1

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mm-calc-release
          path: |
            .\dist\MM-CALC-Cientifica-*-win-x64-portable\
            .\dist\MM-CALC-Cientifica-*-win-x64-portable.zip
            .\dist\installer\MM-CALC-Cientifica-Setup-*.exe
            .\dist\SHA256SUMS.txt

      - name: Attach files to GitHub release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $portableZip = Get-ChildItem .\dist\MM-CALC-Cientifica-*-win-x64-portable.zip | Select-Object -First 1 -ExpandProperty FullName
          $installer = Get-ChildItem .\dist\installer\MM-CALC-Cientifica-Setup-*.exe | Select-Object -First 1 -ExpandProperty FullName
          gh release upload ${{ github.event.release.tag_name }} `
            $portableZip `
            $installer `
            .\dist\SHA256SUMS.txt `
            --clobber
